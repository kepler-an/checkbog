<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0B1F3A"/>
  <!-- Purple glow top-right -->
  <radialGradient id="g1" cx="80%" cy="15%" r="50%">
    <stop offset="0%" stop-color="#6C4CF1" stop-opacity="0.45"/>
    <stop offset="100%" stop-color="#0B1F3A" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <!-- Purple glow bottom-left -->
  <radialGradient id="g2" cx="15%" cy="85%" r="40%">
    <stop offset="0%" stop-color="#8B6FF5" stop-opacity="0.30"/>
    <stop offset="100%" stop-color="#0B1F3A" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <!-- Logo icon -->
  <rect x="96" y="200" width="72" height="72" rx="16" fill="#6C4CF1"/>
  <path d="M108 236l14 14 28-28" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Brand name -->
  <text x="188" y="254" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1">Checkbog</text>

  <!-- Divider -->
  <rect x="96" y="304" width="480" height="2" rx="1" fill="#6C4CF1" opacity="0.5"/>

  <!-- Tagline -->
  <text x="96" y="356" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="rgba(255,255,255,0.72)">Tu presencia digital, conectada</text>
  <text x="96" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="rgba(255,255,255,0.72)">y funcionando.</text>

  <!-- CTA pill -->
  <rect x="96" y="450" width="280" height="56" rx="28" fill="#FFC107"/>
  <text x="236" y="484" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1A1A2E" text-anchor="middle">Revisar mi web gratis</text>

  <!-- Decorative right side circles -->
  <circle cx="980" cy="315" r="180" stroke="#6C4CF1" stroke-width="1.5" fill="none" opacity="0.25"/>
  <circle cx="980" cy="315" r="130" stroke="#8B6FF5" stroke-width="1" fill="none" opacity="0.20"/>
  <circle cx="980" cy="315" r="70"  fill="#6C4CF1" opacity="0.15"/>
  <circle cx="980" cy="315" r="30"  fill="#6C4CF1" opacity="0.40"/>
  <!-- Checkmark in center circle -->
  <path d="M966 315l8 8 18-18" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
